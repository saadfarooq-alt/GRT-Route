<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRT Stop Request</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
  :root {
    --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #242424;
    --border: #2e2e2e; --text: #f0f0f0; --text-muted: #888;
    --green: #00b050; --green-dim: rgba(0,176,80,0.12);
    --green-glow: rgba(0,176,80,0.35); --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding-bottom: 48px; }
  header { width: 100%; background: var(--surface); border-bottom: 1px solid var(--border); padding: 18px 24px 16px; display: flex; align-items: center; gap: 12px; }
  .logo { width: 36px; height: 36px; background: var(--green); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; color: #000; flex-shrink: 0; }
  header h1 { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; }
  header p { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
  .container { width: 100%; max-width: 480px; padding: 24px 20px 0; display: flex; flex-direction: column; gap: 20px; }
  .section-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
  .tabs { display: flex; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 4px; gap: 4px; }
  .tab { flex: 1; padding: 10px; border: none; border-radius: 10px; background: transparent; color: var(--text-muted); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.15s, color 0.15s; display: flex; align-items: center; justify-content: center; gap: 6px; }
  .tab.active { background: var(--surface2); color: var(--text); }
  .panel { display: none; flex-direction: column; gap: 12px; }
  .panel.active { display: flex; }
  .gps-btn { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500; padding: 14px 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: border-color 0.15s, background 0.15s; }
  .gps-btn:hover { border-color: var(--green); background: var(--green-dim); }
  .gps-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .gps-status { font-size: 13px; color: var(--text-muted); text-align: center; padding: 4px 0; min-height: 20px; }
  .gps-status.error { color: #ff6b6b; }
  .gps-status.loading { color: var(--green); }
  .nearby-list { display: flex; flex-direction: column; gap: 6px; }
  .distance-badge { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--green); background: var(--green-dim); padding: 3px 8px; border-radius: 5px; white-space: nowrap; flex-shrink: 0; }
  .select-wrapper { position: relative; }
  select { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; padding: 14px 42px 14px 16px; appearance: none; cursor: pointer; transition: border-color 0.15s; outline: none; }
  select:focus { border-color: var(--green); }
  .select-arrow { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); pointer-events: none; color: var(--text-muted); font-size: 12px; }
  option { background: #1a1a1a; }
  .search-box { position: relative; }
  .search-box input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; padding: 14px 16px 14px 44px; outline: none; transition: border-color 0.15s; }
  .search-box input::placeholder { color: var(--text-muted); }
  .search-box input:focus { border-color: var(--green); }
  .search-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 16px; pointer-events: none; }
  .stop-results { display: flex; flex-direction: column; gap: 6px; max-height: 260px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
  .stop-item { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; cursor: pointer; transition: border-color 0.12s, background 0.12s; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .stop-item:hover { border-color: #444; background: var(--surface2); }
  .stop-item.selected { border-color: var(--green); background: var(--green-dim); }
  .stop-name { font-size: 14px; font-weight: 500; line-height: 1.3; }
  .stop-meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .stop-id { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-muted); background: var(--surface2); padding: 3px 7px; border-radius: 5px; white-space: nowrap; flex-shrink: 0; }
  .stop-item.selected .stop-id { background: var(--green-dim); color: var(--green); }
  .selected-stop-card { background: var(--surface); border: 1px solid var(--green); border-radius: var(--radius); padding: 16px; display: none; }
  .selected-stop-card.visible { display: block; }
  .card-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--green); margin-bottom: 6px; }
  .card-stop-name { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
  .card-stop-sub { font-size: 13px; color: var(--text-muted); margin-top: 3px; }
  .card-stop-id { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text-muted); margin-top: 8px; }
  .request-btn { width: 100%; background: var(--green); color: #000; border: none; border-radius: var(--radius); font-family: 'DM Sans', sans-serif; font-size: 17px; font-weight: 700; padding: 18px; cursor: pointer; letter-spacing: -0.2px; transition: opacity 0.15s, transform 0.1s, box-shadow 0.2s; }
  .request-btn:disabled { background: var(--surface2); color: var(--text-muted); cursor: not-allowed; box-shadow: none; }
  .request-btn:not(:disabled):hover { opacity: 0.9; box-shadow: 0 0 28px var(--green-glow); }
  .request-btn:not(:disabled):active { transform: scale(0.98); }
  .request-btn.sent { background: var(--surface2); color: var(--green); border: 1px solid var(--green); }
  .request-btn.sending { opacity: 0.7; cursor: not-allowed; }
  .confirmation { display: none; background: var(--green-dim); border: 1px solid var(--green); border-radius: var(--radius); padding: 14px 16px; font-size: 14px; color: var(--green); font-weight: 500; align-items: center; gap: 10px; }
  .confirmation.visible { display: flex; }
  .firebase-status { font-size: 12px; padding: 8px 12px; border-radius: 8px; text-align: center; display: none; }
  .firebase-status.error { display: block; background: rgba(255,68,68,0.1); border: 1px solid rgba(255,68,68,0.3); color: #ff6b6b; }
  hr { border: none; border-top: 1px solid var(--border); }
  .empty-state { text-align: center; padding: 24px 0; font-size: 14px; color: var(--text-muted); }
  .status-note { font-size: 12px; color: var(--text-muted); text-align: center; line-height: 1.5; padding: 0 8px; }
  .status-note a { color: var(--green); text-decoration: none; }
</style>
</head>
<body>

<header>
  <div class="logo">GRT</div>
  <div>
    <h1>Stop Request</h1>
    <p>Signal your stop to the driver</p>
  </div>
</header>

<div class="container">
  <div>
    <div class="section-label">Your Route</div>
    <div class="select-wrapper">
      <select id="routeSelect"><option value="">Select a route...</option></select>
      <span class="select-arrow">&#9660;</span>
    </div>
  </div>

  <div>
    <div class="section-label">Find Your Stop</div>
    <div class="tabs">
      <button class="tab active" id="tabGps" onclick="switchTab('gps')">&#9673; Nearby</button>
      <button class="tab" id="tabSearch" onclick="switchTab('search')">&#9740; Search</button>
    </div>
  </div>

  <div class="panel active" id="panelGps">
    <button class="gps-btn" id="gpsBtn" onclick="getNearby()">
      <span style="font-size:18px">&#9673;</span> Find stops near me
    </button>
    <div class="gps-status" id="gpsStatus"></div>
    <div class="nearby-list" id="nearbyList"></div>
  </div>

  <div class="panel" id="panelSearch">
    <div class="search-box">
      <span class="search-icon">&#9740;</span>
      <input type="text" id="stopSearch" placeholder="Street name or stop ID..." autocomplete="off">
    </div>
    <div class="stop-results" id="stopResults"><div class="empty-state">Type to search stops</div></div>
  </div>

  <hr>

  <div id="selectedCard" class="selected-stop-card">
    <div class="card-label">Selected Stop</div>
    <div class="card-stop-name" id="cardName"></div>
    <div class="card-stop-sub" id="cardSub"></div>
    <div class="card-stop-id" id="cardId"></div>
  </div>

  <div class="confirmation" id="confirmation">
    <span style="font-size:20px;flex-shrink:0">&#10003;</span>
    <span id="confirmationText"></span>
  </div>

  <div class="firebase-status" id="firebaseStatus"></div>

  <button class="request-btn" id="requestBtn" disabled>Select a stop to request it</button>

  <p class="status-note">
    Requests go to a live Firebase DB but are not yet connected to GRT drivers yet.<br>
    Built with <a href="https://www.regionofwaterloo.ca/en/living-here/grt-open-data.aspx" target="_blank">GRT open data</a>.
  </p>
</div>

// Populate routes
const routeSelect = document.getElementById('routeSelect');
ROUTES.forEach(r => {
  const opt = document.createElement('option');
  opt.value = r.Route;
  opt.textContent = r.display + ' · ' + r.City;
  routeSelect.appendChild(opt);
});

let selectedStop = null;
let requestSent = false;

const requestBtn = document.getElementById('requestBtn');
const confirmation = document.getElementById('confirmation');
const selectedCard = document.getElementById('selectedCard');
const firebaseStatus = document.getElementById('firebaseStatus');

function switchTab(tab) {
  document.getElementById('tabGps').classList.toggle('active', tab === 'gps');
  document.getElementById('tabSearch').classList.toggle('active', tab === 'search');
  document.getElementById('panelGps').classList.toggle('active', tab === 'gps');
  document.getElementById('panelSearch').classList.toggle('active', tab === 'search');
}
window.switchTab = switchTab;

function haversineKm(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function formatDist(km) { return km < 1 ? Math.round(km * 1000) + 'm' : km.toFixed(1) + 'km'; }

function getNearby() {
  const btn = document.getElementById('gpsBtn');
  const status = document.getElementById('gpsStatus');
  btn.disabled = true;
  status.className = 'gps-status loading';
  status.textContent = 'Getting your location...';
  if (!navigator.geolocation) {
    status.className = 'gps-status error';
    status.textContent = 'Geolocation not supported on this browser.';
    btn.disabled = false; return;
  }
  navigator.geolocation.getCurrentPosition(pos => {
    const { latitude: lat, longitude: lon } = pos.coords;
    status.className = 'gps-status';
    status.textContent = 'Showing stops closest to your location';
    const withDist = STOPS.map(s => ({...s, dist: haversineKm(lat, lon, s.Latitude, s.Longitude)}))
      .sort((a, b) => a.dist - b.dist).slice(0, 8);
    const list = document.getElementById('nearbyList');
    list.innerHTML = '';
    withDist.forEach(s => {
      const div = document.createElement('div');
      div.className = 'stop-item' + (selectedStop?.StopID === s.StopID ? ' selected' : '');
      div.innerHTML = `<div><div class="stop-name">${s.Street}</div><div class="stop-meta">at ${s.CrossStreet} · ${s.Municipality || ''}</div></div><span class="distance-badge">${formatDist(s.dist)}</span>`;
      div.addEventListener('click', () => selectStop(s));
      list.appendChild(div);
    });
    btn.disabled = false;
  }, err => {
    status.className = 'gps-status error';
    status.textContent = err.code === 1 ? 'Location permission denied. Try the search tab.' : 'Could not get location. Try search instead.';
    btn.disabled = false;
  }, { timeout: 10000, maximumAge: 60000 });
}
window.getNearby = getNearby;

document.getElementById('stopSearch').addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  const stopResults = document.getElementById('stopResults');
  if (!q) { stopResults.innerHTML = '<div class="empty-state">Type to search stops</div>'; return; }
  const matches = STOPS.filter(s =>
    (s.Street||'').toLowerCase().includes(q) ||
    (s.CrossStreet||'').toLowerCase().includes(q) ||
    String(s.StopID).startsWith(q)
  ).slice(0, 30);
  if (!matches.length) { stopResults.innerHTML = '<div class="empty-state">No stops found</div>'; return; }
  stopResults.innerHTML = '';
  matches.forEach(s => {
    const div = document.createElement('div');
    div.className = 'stop-item' + (selectedStop?.StopID === s.StopID ? ' selected' : '');
    div.innerHTML = `<div><div class="stop-name">${s.Street}</div><div class="stop-meta">at ${s.CrossStreet} · ${s.Municipality || ''}</div></div><span class="stop-id">#${s.StopID}</span>`;
    div.addEventListener('click', () => selectStop(s));
    stopResults.appendChild(div);
  });
});

function selectStop(stop) {
  selectedStop = stop;
  requestSent = false;
  selectedCard.classList.add('visible');
  document.getElementById('cardName').textContent = stop.Street;
  document.getElementById('cardSub').textContent = 'at ' + stop.CrossStreet + ' · ' + (stop.Municipality || '');
  document.getElementById('cardId').textContent = 'Stop #' + stop.StopID + (stop.Status === 'Detour' ? '  ·  Detour active' : '');
  requestBtn.disabled = false;
  requestBtn.className = 'request-btn';
  requestBtn.textContent = 'Request This Stop';
  confirmation.classList.remove('visible');
  firebaseStatus.className = 'firebase-status';
}

requestBtn.addEventListener('click', async () => {
  if (!selectedStop || requestSent) return;
  const route = routeSelect.value;

  requestBtn.classList.add('sending');
  requestBtn.textContent = 'Sending...';
  requestBtn.disabled = true;
  firebaseStatus.className = 'firebase-status';

  try {
    await push(ref(db, 'stopRequests'), {
      stopId: selectedStop.StopID,
      street: selectedStop.Street,
      crossStreet: selectedStop.CrossStreet,
      municipality: selectedStop.Municipality || '',
      route: route || null,
      timestamp: serverTimestamp()
    });

    requestSent = true;
    requestBtn.className = 'request-btn sent';
    requestBtn.textContent = 'Stop Requested';
    requestBtn.disabled = false;
    confirmation.classList.add('visible');
    document.getElementById('confirmationText').textContent =
      'Request sent for stop #' + selectedStop.StopID + ' — ' + selectedStop.Street + ' at ' + selectedStop.CrossStreet + '.';
  } catch (err) {
    requestBtn.className = 'request-btn';
    requestBtn.textContent = 'Request This Stop';
    requestBtn.disabled = false;
    firebaseStatus.className = 'firebase-status error';
    firebaseStatus.textContent = 'Failed to send request. Check your connection and try again.';
    console.error('Firebase error:', err);
  }
});
</script>
